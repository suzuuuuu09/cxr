name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test --locked

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          archive_dir="dist"
          archive_name="cxr-${version}.tar.gz"
          archive_path="${archive_dir}/${archive_name}"
          sha256_path="${archive_path}.sha256"

          mkdir -p "${archive_dir}"
          git archive \
            --format=tar \
            --prefix="cxr-${version}/" \
            "${GITHUB_SHA}" \
            | gzip -n > "${archive_path}"
          sha256sum "${archive_path}" > "${sha256_path}"
          ./scripts/render-packaging.sh "${version}" "$(cut -d' ' -f1 "${sha256_path}")"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/packaging/homebrew/cxr.rb
            dist/packaging/scoop/cxr.json
