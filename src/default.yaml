name: "default template"
description: "A default template generated by cx"
variables:
  - project_name
items:
  - type: "directory"
    name: "src"
    items:
      - type: "file"
        name: "main.py"
        content: |
          def main():
              print("Hello, {{ project_name }}!")
  - type: "file"
    name: "README.md"
    content: "# {{ project_name }}\n\nThis is a default template generated by cx."

