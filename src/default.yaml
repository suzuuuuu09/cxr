name: "default template"
description: "A default template generated by cx"
variables:
  - project_name
items:
  - type: "directory"
    name: "src"
  - type: "file"
    name: "README.md"
    content: "# {{ project_name }}"
  - type: "file"
    name: "src/main.rs"
    content: |
      fn main() {
        println!("Hello, world!");
      }
